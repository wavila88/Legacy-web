services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legacy_db
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d legacy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
